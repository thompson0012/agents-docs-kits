name: Base Template Skill Audit

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  audit-base-template-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run base template skill audit
        run: python3 scripts/audit_base_template_skills.py
